# Staging environment Docker Compose configuration
version: '3.8'

services:
  # MySQL database for staging
  mysql:
    image: mysql:8.0
    container_name: internship_mysql_staging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: internship_db
      MYSQL_USER: internship
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-intern123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_staging:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - internship_network_staging
    restart: unless-stopped

  # Redis cache for staging
  redis:
    image: redis:7-alpine
    container_name: internship_redis_staging
    ports:
      - "6380:6379"
    volumes:
      - redis_data_staging:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internship_network_staging
    restart: unless-stopped

  # Backend API service for staging
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: internship_backend_staging
    environment:
      - DATABASE_URL=mysql+pymysql://internship:${MYSQL_PASSWORD:-intern123}@mysql:3306/internship_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=staging
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./logs/backend_staging:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internship_network_staging
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend web application for staging
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: internship_frontend_staging
    environment:
      - VITE_API_BASE_URL=http://localhost:8001/api/v1
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app
      - ./logs/frontend_staging:/var/log/nginx
    depends_on:
      - backend
    networks:
      - internship_network_staging
    restart: unless-stopped

  # Nginx reverse proxy for staging (optional)
  nginx:
    image: nginx:alpine
    container_name: internship_nginx_staging
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx_staging:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internship_network_staging
    restart: unless-stopped

  # Monitoring stack for staging
  prometheus:
    image: prom/prometheus:latest
    container_name: internship_prometheus_staging
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/staging.yml:/etc/prometheus/prometheus.yml
      - prometheus_data_staging:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - internship_network_staging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: internship_grafana_staging
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data_staging:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - internship_network_staging
    restart: unless-stopped

networks:
  internship_network_staging:
    driver: bridge

volumes:
  mysql_data_staging:
  redis_data_staging:
  prometheus_data_staging:
  grafana_data_staging: