# Production Docker Compose configuration
version: '3.8'

services:
  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: internship_mysql_prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: internship_db
      MYSQL_USER: internship
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - internship_network
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: internship_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internship_network
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: internship_backend_prod
    environment:
      - DATABASE_URL=mysql+pymysql://internship:${MYSQL_PASSWORD}@mysql:3306/internship_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./logs/backend:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internship_network
    restart: unless-stopped
    # No external ports exposed - only accessible via nginx
    expose:
      - "8000"

  # Frontend web application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: internship_frontend_prod
    volumes:
      - ./logs/frontend:/var/log/nginx
    depends_on:
      - backend
    networks:
      - internship_network
    restart: unless-stopped
    expose:
      - "80"

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: internship_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internship_network
    restart: unless-stopped

networks:
  internship_network:
    driver: bridge

volumes:
  mysql_data_prod:
  redis_data_prod: