name: Deploy Internship AI Assistant

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Docker image tag'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/internship-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/internship-frontend

jobs:
  # Job 1: Lint and test
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install black flake8 mypy pytest

      - name: Lint with Black
        run: |
          cd backend
          black --check --diff .

      - name: Lint with Flake8
        run: |
          cd backend
          flake8 .

      - name: Type check with MyPy
        run: |
          cd backend
          mypy --ignore-missing-imports .

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests

  # Job 2: Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.internship.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/internship-ai

            # Pull latest images
            docker-compose -f docker-compose.staging.yml pull

            # Deploy new version
            docker-compose -f docker-compose.staging.yml up -d --force-recreate

            # Run database migrations
            docker-compose -f docker-compose.staging.yml exec backend alembic upgrade head

            # Health check
            sleep 10
            curl -f http://localhost:8001/health || exit 1

            echo "Staging deployment successful"

      - name: Run integration tests
        run: |
          curl -X POST https://staging.internship.example.com/api/v1/parse/intent \
            -H "Content-Type: application/json" \
            -d '{"raw_input": "测试产品经理实习"}' \
            --fail --silent --show-error

  # Job 4: Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://internship.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for approval (manual)
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.PRODUCTION_APPROVERS }}
          issue-title: "Production deployment approval for ${{ github.ref_name }}"
          issue-body: |
            Please review and approve the production deployment.

            **Version**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Changes**: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

            Approve only after:
            - [ ] Staging tests passed
            - [ ] Performance tests completed
            - [ ] Security scan passed

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/internship-ai

            # Backup current deployment
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            docker-compose -f docker-compose.prod.yml ps > backup_$TIMESTAMP.log
            docker-compose -f docker-compose.prod.yml exec mysql mysqldump -u internship -p$MYSQL_PASSWORD internship_db > backup_$TIMESTAMP.sql

            # Pull new images
            docker-compose -f docker-compose.prod.yml pull

            # Deploy new version (rolling update)
            docker-compose -f docker-compose.prod.yml up -d --force-recreate --scale backend=2

            # Wait for new containers to be healthy
            sleep 30

            # Run database migrations
            docker-compose -f docker-compose.prod.yml exec backend alembic upgrade head

            # Health check
            curl -f https://internship.example.com/health || exit 1

            # Remove old containers
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Production deployment successful"

            # Send deployment notification
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{"text": "✅ Production deployment completed: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nEnvironment: https://internship.example.com"}'

      - name: Verify deployment
        run: |
          # Verify endpoints
          curl -f https://internship.example.com/health
          curl -f https://internship.example.com/api/v1/parse/intent \
            -H "Content-Type: application/json" \
            -d '{"raw_input": "测试"}' \
            --fail --silent --show-error

  # Job 5: Post-deployment monitoring
  post-deployment:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ Deployment successful"

            # Monitor for 5 minutes
            for i in {1..30}; do
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://internship.example.com/health)
              if [ "$RESPONSE" == "200" ]; then
                echo "Health check passed ($i/30)"
              else
                echo "⚠️ Health check failed: $RESPONSE"
              fi
              sleep 10
            done
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Send final notification
        if: ${{ needs.deploy-production.result == 'success' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text": "🎉 Deployment ${{ github.ref_name }} completed successfully!\n• Health checks: ✅\n• Monitoring: https://grafana.internship.example.com\n• Application: https://internship.example.com"}'

  # Job 6: Rollback (manual trigger)
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'rollback'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/internship-ai

            echo "Starting rollback..."

            # Stop current version
            docker-compose -f docker-compose.prod.yml down

            # Restore from backup (if available)
            if [ -f "backup_*.sql" ]; then
              LATEST_BACKUP=$(ls -t backup_*.sql | head -1)
              docker-compose -f docker-compose.prod.yml exec mysql mysql -u internship -p$MYSQL_PASSWORD internship_db < $LATEST_BACKUP
            fi

            # Start previous version
            docker-compose -f docker-compose.prod.yml up -d

            echo "Rollback completed"

            # Send rollback notification
            curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{"text": "🔄 Production rollback executed\nReason: Manual trigger via GitHub Actions"}'

# Notifications
notifications:
  email:
    recipients:
      - devops@example.com
      - engineering@example.com
    on_success: change
    on_failure: always