# Production environment configuration
# This file provides configuration for production environment
# All sensitive values should be set via environment variables

# Application settings
app:
  name: "Internship Assistant API"
  version: "1.0.0"
  debug: false
  log_level: "INFO"
  log_format: "json"  # JSON format for structured logging

# Database configuration
database:
  # URL should be set via DATABASE_URL environment variable
  url: "${DATABASE_URL}"
  pool_size: 20
  max_overflow: 40
  pool_recycle: 3600
  pool_pre_ping: true
  echo: false  # Disable SQL logging in production

# Redis configuration
redis:
  # URL should be set via REDIS_URL environment variable
  url: "${REDIS_URL}"
  pool_size: 20
  decode_responses: true
  socket_keepalive: true
  health_check_interval: 30

# Security settings
security:
  # Secret key should be set via SECRET_KEY environment variable
  secret_key: "${SECRET_KEY}"
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7
  cors_origins:
    - "https://yourdomain.com"
    - "https://www.yourdomain.com"
  # Enable strict CORS in production
  cors_allow_credentials: true
  cors_allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  cors_allow_headers: ["Authorization", "Content-Type"]

# Crawler settings
crawler:
  delay_min: 2.0
  delay_max: 10.0
  max_retries: 5
  timeout: 60
  use_proxy: true  # Use proxy in production to avoid blocking
  proxy_list: []  # Should be populated via environment variable

# OpenAI/LLM settings
llm:
  openai_api_key: "${OPENAI_API_KEY}"
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.3  # Lower temperature for more consistent results
  max_tokens: 1000

# Feature flags
features:
  enable_crawler: true
  enable_llm_evaluation: true
  enable_cache: true
  enable_analytics: true  # Enable analytics in production
  enable_rate_limiting: true

# Monitoring
monitoring:
  enable_metrics: true
  enable_tracing: true
  sentry_dsn: "${SENTRY_DSN}"
  prometheus_port: 9090

# File storage
storage:
  type: "s3"  # Use S3 in production
  s3_bucket: "${S3_BUCKET}"
  s3_region: "${S3_REGION}"
  s3_access_key: "${AWS_ACCESS_KEY_ID}"
  s3_secret_key: "${AWS_SECRET_ACCESS_KEY}"
  max_file_size: 52428800  # 50MB

# API rate limiting
rate_limit:
  enabled: true
  requests_per_minute: 100
  burst_limit: 20
  storage_url: "${REDIS_URL}"  # Use Redis for distributed rate limiting

# Cache settings
cache:
  default_ttl: 3600  # 1 hour
  job_search_ttl: 1800  # 30 minutes for job searches
  question_generation_ttl: 86400  # 24 hours for generated questions

# Session settings
session:
  cookie_secure: true
  cookie_httponly: true
  cookie_samesite: "lax"
  session_ttl: 86400  # 24 hours

# Email settings
email:
  enabled: true
  smtp_host: "${SMTP_HOST}"
  smtp_port: "${SMTP_PORT}"
  smtp_user: "${SMTP_USER}"
  smtp_password: "${SMTP_PASSWORD}"
  from_email: "noreply@yourdomain.com"

# Backup settings
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30