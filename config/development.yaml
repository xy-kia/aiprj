# Development environment configuration
# This file provides configuration for development environment
# Override with environment variables as needed

# Application settings
app:
  name: "Internship Assistant API"
  version: "1.0.0"
  debug: true
  log_level: "DEBUG"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Database configuration
database:
  url: "mysql+pymysql://root:root123@localhost:3306/internship_db"
  pool_size: 10
  max_overflow: 20
  echo: true  # Enable SQL logging in development

# Redis configuration
redis:
  url: "redis://localhost:6379/0"
  pool_size: 10
  decode_responses: true

# Security settings
security:
  secret_key: "development-secret-key-change-in-production"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost:8080"

# Crawler settings
crawler:
  delay_min: 1.0
  delay_max: 5.0
  max_retries: 3
  timeout: 30
  use_proxy: false
  proxy_list: []

# OpenAI/LLM settings
llm:
  openai_api_key: ""  # Set via environment variable
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4o-mini"
  anthropic_api_key: ""  # Set via environment variable
  temperature: 0.7
  max_tokens: 2000

# Feature flags
features:
  enable_crawler: true
  enable_llm_evaluation: true
  enable_cache: true
  enable_analytics: false

# Testing settings
testing:
  mock_crawler: true
  mock_llm: false
  test_database_url: "sqlite:///./test.db"

# Monitoring
monitoring:
  enable_metrics: true
  enable_tracing: false
  sentry_dsn: ""  # Set via environment variable

# Email settings (optional)
email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""

# File storage
storage:
  type: "local"
  local_path: "./uploads"
  max_file_size: 10485760  # 10MB

# API rate limiting
rate_limit:
  enabled: false
  requests_per_minute: 60
  burst_limit: 10